<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bass Remix by SHN</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="manifest" href="/manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'term-bg': '#050505',
                        'term-text': '#00ff41',
                        'term-card': '#111111',
                        'term-border': '#333333',
                        'term-hover': '#003300'
                    },
                    fontFamily: {
                        'mono': ['"Courier New"', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: var(--bg, #050505);
            color: var(--text, #00ff41);
            font-family: 'Courier New', monospace;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        a { text-decoration: none; color: inherit; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: var(--border, #333); 
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px; width: 8px; background: var(--text, #00ff41);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px; 
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .playlist-item { 
            transition: 0.3s; 
            background: var(--card-bg, #111);
            border: 1px solid var(--border, #333);
        }
        .playlist-item:hover { 
            background: var(--term-hover, #003300); 
            border-color: var(--text, #00ff41); 
            transform: translateX(5px);
        }
        .playlist-item.active { 
            background: var(--term-hover, #003300); 
            border-color: var(--text, #00ff41); 
            border-left-width: 4px;
        }

        .control-btn { transition: all 0.2s; color: #888; }
        .control-btn:hover { color: var(--text, #00ff41); transform: scale(1.1); }
        .control-btn.active { color: var(--text, #00ff41); text-shadow: 0 0 8px rgba(0,255,65,0.5); }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="flex-grow flex items-center justify-center w-full max-w-5xl mx-auto">
        <div class="w-full rounded-none flex flex-col md:flex-row border border-term-border bg-term-card md:h-[650px] shadow-[0_0_20px_rgba(0,255,65,0.05)]">
            
            <div class="w-full md:w-1/2 p-8 flex flex-col justify-between border-b md:border-b-0 md:border-r border-term-border bg-term-card">
                
                <header class="flex justify-between items-center mb-6 border-b border-term-border pb-4">
                    <div>
                        <h1 class="text-2xl font-bold tracking-widest uppercase">Bass Remix by SHN</h1>
                        <p class="text-xs text-[#888] tracking-widest uppercase mt-1">Status: Online</p>
                    </div>
                    <button id="btn-share" class="p-2 border border-term-border bg-term-bg hover:bg-term-hover hover:border-term-text transition-colors cursor-pointer group">
                        <i data-lucide="share-2" class="text-[#888] group-hover:text-term-text w-6 h-6 transition-colors"></i>
                    </button>
                </header>

                <div class="aspect-square w-full max-w-[280px] mx-auto bg-term-bg flex items-center justify-center mb-6 border border-term-border relative overflow-hidden">
                    <canvas id="visualizer" class="w-full h-full"></canvas>
                    <div id="vis-placeholder" class="absolute inset-0 flex items-center justify-center pointer-events-none transition-opacity duration-300">
                        <i data-lucide="radio" class="text-term-border w-24 h-24"></i>
                    </div>
                    <button id="btn-vis-mode" class="absolute top-2 left-2 text-[10px] text-[#888] font-bold hover:text-term-text transition-colors z-10 cursor-pointer">
                        [MODE: FREQ]
                    </button>
                    <div class="absolute bottom-2 right-2 text-[10px] text-term-text font-bold flex items-center gap-1 animate-pulse">
                        <div class="w-2 h-3 bg-term-text"></div> REC
                    </div>
                </div>

                <div class="flex items-center gap-4 mb-6 p-4 border border-term-border bg-term-bg">
                    <div class="w-16 h-16 border border-term-border flex-shrink-0 bg-[#050505]">
                        <img id="album-cover" src="" class="w-full h-full object-cover mix-blend-screen opacity-90">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h2 id="current-title" class="text-lg font-bold text-term-text mb-1 truncate">> Select_a_track</h2>
                        <p id="current-artist" class="text-[#888] text-sm truncate">---</p>
                        <div id="current-album-tag" class="inline-block mt-1 px-2 py-0.5 border border-[#333] text-[10px] text-term-text tracking-widest bg-term-hover">---</div>
                    </div>
                </div>

                <div class="mb-6 px-2">
                    <input type="range" id="progress-bar" value="0" min="0" max="100" class="w-full mb-3">
                    <div class="flex justify-between text-xs text-[#888] font-bold">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                </div>

                <div class="flex items-center justify-center gap-6">
                    <button id="btn-shuffle" class="control-btn" title="Shuffle"><i data-lucide="shuffle" class="w-5 h-5"></i></button>
                    <button id="btn-prev" class="control-btn"><i data-lucide="skip-back" class="w-6 h-6"></i></button>
                    
                    <button id="btn-play" class="bg-term-bg hover:bg-term-hover text-term-text border border-term-text p-4 transition-all">
                        <i data-lucide="play" id="play-icon" class="w-6 h-6 fill-current ml-1"></i>
                        <i data-lucide="pause" id="pause-icon" class="w-6 h-6 fill-current hidden"></i>
                    </button>
                    
                    <button id="btn-next" class="control-btn"><i data-lucide="skip-forward" class="w-6 h-6"></i></button>
                    <button id="btn-repeat" class="control-btn" title="Repeat Mode"><i data-lucide="repeat" class="w-5 h-5"></i></button>
                </div>
            </div>

            <div class="w-full md:w-1/2 bg-term-bg flex flex-col h-[500px] md:h-full">
                <div class="p-6 border-b border-term-border flex flex-col gap-4 bg-term-card z-10">
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold tracking-wider uppercase text-sm flex items-center gap-2 text-term-text">
                            <i data-lucide="database" class="w-4 h-4"></i> Databanks
                        </h3>
                        <span id="track-count" class="text-xs bg-term-bg border border-term-border text-[#888] px-3 py-1 font-bold">0 FILES</span>
                    </div>
                    <div class="flex gap-2 text-xs font-bold">
                        <button id="btn-filter-all" class="filter-btn flex-1 py-1.5 border border-term-text bg-term-hover text-term-text transition-colors cursor-pointer" onclick="setAlbumFilter('ALL')">[ ALL ]</button>
                        <button id="btn-filter-25" class="filter-btn flex-1 py-1.5 border border-term-border text-[#888] hover:text-term-text transition-colors cursor-pointer" onclick="setAlbumFilter('2025')">[ 2025 ]</button>
                        <button id="btn-filter-24" class="filter-btn flex-1 py-1.5 border border-term-border text-[#888] hover:text-term-text transition-colors cursor-pointer" onclick="setAlbumFilter('2024')">[ 2024 ]</button>
                    </div>
                </div>
                
                <div id="playlist-container" class="flex-1 overflow-y-auto p-4 scrollbar-hide bg-term-bg">
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" crossorigin="anonymous" preload="auto"></audio>

    <script>
        lucide.createIcons();

        // --- Custom SVG Album Covers (Terminal Theme) ---
        const cover2025 = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23050505'/><path d='M10,80 L50,20 L90,80 Z' fill='none' stroke='%2300ff41' stroke-width='3'/><path d='M0,50 L100,50 M50,0 L50,100' stroke='%23003300' stroke-width='1'/><text x='50' y='65' font-family='monospace' font-size='16' fill='%2300ff41' text-anchor='middle' font-weight='bold'>2025</text><text x='50' y='95' font-family='monospace' font-size='8' fill='%23888' text-anchor='middle' letter-spacing='2'>NEXUS</text></svg>";
        const cover2024 = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23050505'/><circle cx='50' cy='50' r='35' fill='none' stroke='%23003300' stroke-width='4'/><circle cx='50' cy='50' r='25' fill='none' stroke='%2300ff41' stroke-width='2' stroke-dasharray='5 3'/><text x='50' y='55' font-family='monospace' font-size='16' fill='%2300ff41' text-anchor='middle' font-weight='bold'>2024</text><text x='50' y='95' font-family='monospace' font-size='8' fill='%23888' text-anchor='middle' letter-spacing='2'>VAULT</text></svg>";

        // --- MASTER PLAYLIST DATA ---
        const masterPlaylist = [
            // 2025 Album (IDs 0 - 18)
            { id: 0, title: "As alive as you need me to be", originalArtist: "NIN", src: "AsAlive.m4a", album: "2025", cover: cover2025 },
            { id: 1, title: "Be with you", originalArtist: "Kimiko", src: "BeWithU.m4a", album: "2025", cover: cover2025 },
            { id: 2, title: "Now and then", originalArtist: "Akera Sky", src: "NowAndThen.m4a", album: "2025", cover: cover2025 },
            { id: 3, title: "Drunk", originalArtist: "Unknown", src: "Drunk.m4a", album: "2025", cover: cover2025 },
            { id: 4, title: "Toxic Luv", originalArtist: "Haruno 春野", src: "ToxicLuv.mp3", album: "2025", cover: cover2025 },
            { id: 5, title: "Holy", originalArtist: "Lexie Liu", src: "Holy.m4a", album: "2025", cover: cover2025 },
            { id: 6, title: "Juicy", originalArtist: "Jordan Ward", src: "Juicy.mp3", album: "2025", cover: cover2025 },
            { id: 7, title: "Moments", originalArtist: "FKJ", src: "Moments.mp3", album: "2025", cover: cover2025 },
            { id: 8, title: "Novio No", originalArtist: "Sech", src: "NovioNo.mp3", album: "2025", cover: cover2025 },
            { id: 9, title: "On the low", originalArtist: "Tiwa Savage", src: "OnTheLow.mp3", album: "2025", cover: cover2025 },
            { id: 10, title: "Kimi", originalArtist: "Moad Edge", src: "Kimi.m4a", album: "2025", cover: cover2025 },
            { id: 11, title: "Less of you", originalArtist: "keshi", src: "LessOfU.m4a", album: "2025", cover: cover2025 },
            { id: 12, title: "One eye open", originalArtist: "Mimi Webb", src: "OneEyeOpen.m4a", album: "2025", cover: cover2025 },
            { id: 13, title: "One last time", originalArtist: "Fiji Blue", src: "OneLastTime.m4a", album: "2025", cover: cover2025 },
            { id: 14, title: "Save me", originalArtist: "Thousand Below", src: "SaveMe.mp3", album: "2025", cover: cover2025 },
            { id: 15, title: "Set me free", originalArtist: "Martin Garrix & Arcando", src: "SetMeFree.mp3", album: "2025", cover: cover2025 },
            { id: 16, title: "Watch out", originalArtist: "Kardi", src: "WatchOut.mp3", album: "2025", cover: cover2025 },
            { id: 17, title: "Remedy", originalArtist: "Maliya", src: "Remedy.m4a", album: "2025", cover: cover2025 },
            { id: 18, title: "老子写一首悲歌", originalArtist: "河南说唱之神", src: "SadSong.m4a", album: "2025", cover: cover2025 },
            
            // 2024 Album (IDs 19 - 31)
            { id: 19, title: "Temporary", originalArtist: "6Lack", src: "Temporary.m4a", album: "2024", cover: cover2024 },
            { id: 20, title: "Hippo", originalArtist: "Gayla Peevey", src: "Hippo.m4a", album: "2024", cover: cover2024 },
            { id: 21, title: "心经", originalArtist: "药师寺宽邦", src: "HeartStra.m4a", album: "2024", cover: cover2024 },
            { id: 22, title: "Havana covered by Rebecca Black & KHS", originalArtist: "Camila Cabello", src: "Havana.m4a", album: "2024", cover: cover2024 },
            { id: 23, title: "Faster than me", originalArtist: "iri", src: "FasterThanMe.m4a", album: "2024", cover: cover2024 },
            { id: 24, title: "Dancin", originalArtist: "Aaron Smith", src: "Dancin.m4a", album: "2024", cover: cover2024 },
            { id: 25, title: "Brother", originalArtist: "Leah Dou", src: "Brother.m4a", album: "2024", cover: cover2024 },
            { id: 26, title: "Back to you", originalArtist: "Rose", src: "Back2U.m4a", album: "2024", cover: cover2024 },
            { id: 27, title: "夕阳恋歌", originalArtist: "Lexie Liu", src: "IWannaTellU.m4a", album: "2024", cover: cover2024 },
            { id: 28, title: "We've been loving in silence", originalArtist: "MARO", src: "WeVBeen.m4a", album: "2024", cover: cover2024 },
            { id: 29, title: "Something about us", originalArtist: "Daft Punk", src: "SomethingAboutUs.m4a", album: "2024", cover: cover2024 },
            { id: 30, title: "Isn't it Obvious", originalArtist: "Alessia Cara", src: "Obvious.m4a", album: "2024", cover: cover2024 },
            { id: 31, title: "Lose yourself", originalArtist: "Grano Apes", src: "LoseYourSelf.m4a", album: "2024", cover: cover2024 }
        ];

        let currentPlaylist = [...masterPlaylist];
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 1; 

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('btn-play');
        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');
        const shuffleBtn = document.getElementById('btn-shuffle');
        const repeatBtn = document.getElementById('btn-repeat');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const titleEl = document.getElementById('current-title');
        const artistEl = document.getElementById('current-artist');
        const albumCoverEl = document.getElementById('album-cover');
        const albumTagEl = document.getElementById('current-album-tag');
        const playlistContainer = document.getElementById('playlist-container');
        
        // Visualizer Elements
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const visPlaceholder = document.getElementById('vis-placeholder');
        
        let visMode = 0; // 0 = FREQ, 1 = WAVE, 2 = PULSE
        const visModeBtn = document.getElementById('btn-vis-mode');
        const visNames = ['FREQ', 'WAVE', 'PULSE'];

        visModeBtn.addEventListener('click', () => {
            visMode = (visMode + 1) % 3;
            visModeBtn.innerText = `[MODE: ${visNames[visMode]}]`;
        });
        
        let audioCtx;
        let analyser;
        let source;
        let isVisualizerInitialized = false;

        function init() {
            setAlbumFilter('ALL');
            updateControlStyles();
            canvas.width = 300;
            canvas.height = 300;
        }

        // --- NEW: Album Filter Logic ---
        function setAlbumFilter(filterType) {
            const playingTrackId = currentPlaylist[currentTrackIndex]?.id;
            
            if (filterType === 'ALL') {
                currentPlaylist = [...masterPlaylist];
            } else {
                currentPlaylist = masterPlaylist.filter(t => t.album === filterType);
            }

            // Update UI Buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('border-term-text', 'bg-term-hover', 'text-term-text');
                btn.classList.add('border-term-border', 'text-[#888]');
            });
            const activeBtn = filterType === 'ALL' ? 'btn-filter-all' : (filterType === '2025' ? 'btn-filter-25' : 'btn-filter-24');
            const targetBtn = document.getElementById(activeBtn);
            targetBtn.classList.remove('border-term-border', 'text-[#888]');
            targetBtn.classList.add('border-term-text', 'bg-term-hover', 'text-term-text');

            // Try to keep playing the same song if it exists in the new filter
            let newIndex = currentPlaylist.findIndex(t => t.id === playingTrackId);
            
            document.getElementById('track-count').innerText = `${currentPlaylist.length} FILES`;
            renderPlaylist();

            if (newIndex !== -1) {
                currentTrackIndex = newIndex;
                updatePlaylistHighlight();
            } else {
                currentTrackIndex = 0;
                loadTrack(currentTrackIndex, isPlaying);
            }
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            currentPlaylist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = `playlist-item flex items-center p-4 mb-2 cursor-pointer group`;
                if(index === currentTrackIndex) div.classList.add('active');
                
                div.innerHTML = `
                    <div class="w-10 text-xs text-[#888] group-hover:text-term-text transition-colors">[0${index.toString(16).toUpperCase()}]</div>
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="text-[0.95rem] truncate text-white group-hover:text-term-text transition-colors">${track.title}</div>
                        <div class="text-xs text-[#888] truncate transition-colors">> ${track.originalArtist}</div>
                    </div>
                    <div class="w-8 h-8 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="play" class="w-4 h-4 text-term-text"></i>
                    </div>
                `;
                
                div.onclick = () => {
                    currentTrackIndex = index;
                    loadTrack(currentTrackIndex, true);
                };
                playlistContainer.appendChild(div);
            });
            lucide.createIcons();
        }

        function updatePlaylistHighlight() {
            const items = playlistContainer.querySelectorAll('.playlist-item');
            items.forEach((item, index) => {
                if(index === currentTrackIndex) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function initVisualizer() {
            if (isVisualizerInitialized) return;
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            analyser.fftSize = 128;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            function draw() {
                requestAnimationFrame(draw);
                
                if(!isPlaying || document.hidden) return; 
                
                canvasCtx.fillStyle = 'rgba(5, 5, 5, 0.25)'; 
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                if (visMode === 0) {
                    analyser.getByteFrequencyData(dataArray);
                    const barWidth = (canvas.width / bufferLength) * 2;
                    let x = 0;
                    for(let i = 0; i < bufferLength; i++) {
                        let barHeight = dataArray[i];
                        canvasCtx.fillStyle = `rgb(0, ${100 + (155 * (i/bufferLength))}, 65)`;
                        canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                        x += barWidth + 1;
                    }
                } 
                else if (visMode === 1) {
                    analyser.getByteTimeDomainData(dataArray);
                    canvasCtx.lineWidth = 2;
                    canvasCtx.strokeStyle = '#00ff41';
                    canvasCtx.beginPath();
                    const sliceWidth = canvas.width * 1.0 / bufferLength;
                    let x = 0;
                    for(let i = 0; i < bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = v * canvas.height / 2;
                        if(i === 0) canvasCtx.moveTo(x, y);
                        else canvasCtx.lineTo(x, y);
                        x += sliceWidth;
                    }
                    canvasCtx.lineTo(canvas.width, canvas.height / 2);
                    canvasCtx.stroke();
                }
                else if (visMode === 2) {
                    analyser.getByteFrequencyData(dataArray);
                    let bassSum = 0;
                    for(let i = 0; i < 10; i++) bassSum += dataArray[i];
                    let avgBass = bassSum / 10;
                    
                    let radius = (avgBass / 255) * (canvas.width / 2);
                    canvasCtx.beginPath();
                    canvasCtx.arc(canvas.width/2, canvas.height/2, radius, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = `rgba(0, 255, 65, ${avgBass/255})`;
                    canvasCtx.fill();
                    canvasCtx.lineWidth = 2;
                    canvasCtx.strokeStyle = '#00ff41';
                    canvasCtx.stroke();
                }
            }
            
            draw();
            isVisualizerInitialized = true;
        }

        function loadTrack(index, playInstantly = true) {
            const track = currentPlaylist[index];
            if (!track) return;

            audio.src = track.src;
            titleEl.innerText = `> ${track.title}`;
            artistEl.innerText = `AUTHOR: ${track.originalArtist}`;
            
            // Update Cover Art & Album Tag
            albumCoverEl.src = track.cover;
            albumTagEl.innerText = track.album === "2025" ? "NEXUS [25]" : "VAULT [24]";

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title,
                    artist: track.originalArtist,
                    album: track.album === "2025" ? 'Bass Remix: NEXUS' : 'Bass Remix: VAULT',
                    artwork: [{ src: track.cover, sizes: '512x512', type: 'image/svg+xml' }] 
                });

                navigator.mediaSession.setActionHandler('play', playAudio);
                navigator.mediaSession.setActionHandler('pause', pauseAudio);
                navigator.mediaSession.setActionHandler('previoustrack', playPrev);
                navigator.mediaSession.setActionHandler('nexttrack', playNext);
            }
            
            updatePlaylistHighlight();
            
            if (playInstantly) {
                playAudio();
            } else {
                pauseAudio();
            }
        }

        function playAudio() {
            initVisualizer();
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                    visPlaceholder.classList.add('opacity-0');
                    
                    canvasCtx.fillStyle = '#050505';
                    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.playbackState = 'playing';
                    }
                }).catch(error => {
                    console.warn("Background autoplay prevented by OS:", error);
                    pauseAudio(); 
                });
            }
        }

        function pauseAudio() {
            audio.pause();
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            visPlaceholder.classList.remove('opacity-0');

            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = 'paused';
            }
        }

        function togglePlay() {
            if (isPlaying) pauseAudio();
            else playAudio();
        }

        function playNext() {
            if (isShuffle) {
                let newIndex = currentTrackIndex;
                while (newIndex === currentTrackIndex && currentPlaylist.length > 1) {
                    newIndex = Math.floor(Math.random() * currentPlaylist.length);
                }
                currentTrackIndex = newIndex;
            } else {
                currentTrackIndex++;
                if (currentTrackIndex >= currentPlaylist.length) currentTrackIndex = 0;
            }
            loadTrack(currentTrackIndex, true);
        }

        function playPrev() {
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else {
                currentTrackIndex--;
                if (currentTrackIndex < 0) currentTrackIndex = currentPlaylist.length - 1;
                loadTrack(currentTrackIndex, true);
            }
        }

        audio.addEventListener('ended', () => {
            if (repeatMode === 2) {
                audio.currentTime = 0;
                playAudio();
            } else if (repeatMode === 1 || isShuffle) {
                playNext();
            } else {
                if (currentTrackIndex < currentPlaylist.length - 1) playNext();
                else pauseAudio();
            }
        });

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', playNext);
        prevBtn.addEventListener('click', playPrev);

        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            updateControlStyles();
        });

        repeatBtn.addEventListener('click', () => {
            repeatMode = (repeatMode + 1) % 3;
            updateControlStyles();
        });

        function updateControlStyles() {
            if (isShuffle) shuffleBtn.classList.add('active');
            else shuffleBtn.classList.remove('active');

            repeatBtn.classList.remove('active', 'text-term-text');
            if (repeatMode === 1) {
                repeatBtn.classList.add('active');
                repeatBtn.innerHTML = '<i data-lucide="repeat" class="w-5 h-5"></i>';
            } else if (repeatMode === 2) {
                repeatBtn.classList.add('active');
                repeatBtn.innerHTML = '<i data-lucide="repeat-1" class="w-5 h-5" style="stroke-width: 3px;"></i>';
            } else {
                repeatBtn.classList.remove('active');
                repeatBtn.innerHTML = '<i data-lucide="repeat" class="w-5 h-5"></i>';
            }
            lucide.createIcons();
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progressPercent;
                currentTimeEl.innerText = formatTime(audio.currentTime);
                totalTimeEl.innerText = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('input', (e) => {
            if (audio.duration) {
                const seekTime = (e.target.value / 100) * audio.duration;
                audio.currentTime = seekTime;
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        document.getElementById('btn-share').addEventListener('click', async () => {
            const currentTrack = currentPlaylist[currentTrackIndex];
            const shareData = {
                title: 'Bass Remix by SHN',
                text: `Currently listening to: ${currentTrack.title} by ${currentTrack.originalArtist} on Bass Remix by SHN!`,
                url: window.location.href 
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    navigator.clipboard.writeText(`${shareData.text} \n${shareData.url}`);
                    alert("Track info copied to clipboard!");
                }
            } catch (err) {
                console.error('Error sharing:', err);
            }
        });

        init();
    </script>
</body>
</html>
