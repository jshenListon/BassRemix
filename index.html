<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bass Remix by SHN</title>
    
    <link rel="stylesheet" href="/style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'term-bg': '#050505',
                        'term-text': '#00ff41',
                        'term-card': '#111111',
                        'term-border': '#333333',
                        'term-hover': '#003300'
                    },
                    fontFamily: {
                        'mono': ['"Courier New"', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        /* Override Tailwind body to ensure style.css compatibility */
        body {
            background-color: var(--bg, #050505);
            color: var(--text, #00ff41);
            font-family: 'Courier New', monospace;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        a { text-decoration: none; color: inherit; }

        /* Terminal Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: var(--border, #333); 
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px; width: 8px; background: var(--text, #00ff41); /* Blocky terminal cursor look */
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px; 
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .playlist-item { 
            transition: 0.3s; 
            background: var(--card-bg, #111);
            border: 1px solid var(--border, #333);
        }
        .playlist-item:hover { 
            background: var(--term-hover, #003300); 
            border-color: var(--text, #00ff41); 
            transform: translateX(5px);
        }
        .playlist-item.active { 
            background: var(--term-hover, #003300); 
            border-color: var(--text, #00ff41); 
            border-left-width: 4px;
        }

        .control-btn { transition: all 0.2s; color: #888; }
        .control-btn:hover { color: var(--text, #00ff41); transform: scale(1.1); }
        .control-btn.active { color: var(--text, #00ff41); text-shadow: 0 0 8px rgba(0,255,65,0.5); }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="flex-grow flex items-center justify-center w-full max-w-5xl mx-auto">
        <div class="w-full rounded-none flex flex-col md:flex-row border border-term-border bg-term-card md:h-[650px] shadow-[0_0_20px_rgba(0,255,65,0.05)]">
            
            <div class="w-full md:w-1/2 p-8 flex flex-col justify-between border-b md:border-b-0 md:border-r border-term-border bg-term-card">
                
                <header class="flex justify-between items-center mb-6 border-b border-term-border pb-4">
                    <div>
                        <h1 class="text-2xl font-bold tracking-widest uppercase">Bass Remix by SHN</h1>
                        <p class="text-xs text-[#888] tracking-widest uppercase mt-1">Status: Online</p>
                    </div>
                    <div class="p-2 border border-term-border bg-term-bg">
                        <i data-lucide="terminal" class="text-term-text w-6 h-6"></i>
                    </div>
                </header>

                <div class="aspect-square w-full max-w-[280px] mx-auto bg-term-bg flex items-center justify-center mb-8 border border-term-border relative overflow-hidden">
                    <canvas id="visualizer" class="w-full h-full"></canvas>
                    <div id="vis-placeholder" class="absolute inset-0 flex items-center justify-center pointer-events-none transition-opacity duration-300">
                        <i data-lucide="radio" class="text-term-border w-24 h-24"></i>
                    </div>
                    <div class="absolute top-2 left-2 text-[10px] text-[#888] font-bold">SYS.VISUALIZER</div>
                    <div class="absolute bottom-2 right-2 text-[10px] text-term-text font-bold flex items-center gap-1 animate-pulse">
                        <div class="w-2 h-3 bg-term-text"></div> REC
                    </div>
                </div>

                <div class="text-center mb-6 p-4 border border-term-border bg-term-bg">
                    <h2 id="current-title" class="text-lg font-bold text-term-text mb-1 truncate">> Select_a_track</h2>
                    <p id="current-artist" class="text-[#888] text-sm truncate">---</p>
                </div>

                <div class="mb-6 px-2">
                    <input type="range" id="progress-bar" value="0" min="0" max="100" class="w-full mb-3">
                    <div class="flex justify-between text-xs text-[#888] font-bold">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                </div>

                <div class="flex items-center justify-center gap-6">
                    <button id="btn-shuffle" class="control-btn" title="Shuffle"><i data-lucide="shuffle" class="w-5 h-5"></i></button>
                    <button id="btn-prev" class="control-btn"><i data-lucide="skip-back" class="w-6 h-6"></i></button>
                    
                    <button id="btn-play" class="bg-term-bg hover:bg-term-hover text-term-text border border-term-text p-4 transition-all">
                        <i data-lucide="play" id="play-icon" class="w-6 h-6 fill-current ml-1"></i>
                        <i data-lucide="pause" id="pause-icon" class="w-6 h-6 fill-current hidden"></i>
                    </button>
                    
                    <button id="btn-next" class="control-btn"><i data-lucide="skip-forward" class="w-6 h-6"></i></button>
                    <button id="btn-repeat" class="control-btn" title="Repeat Mode"><i data-lucide="repeat" class="w-5 h-5"></i></button>
                </div>
            </div>

            <div class="w-full md:w-1/2 bg-term-bg flex flex-col h-[500px] md:h-full">
                <div class="p-6 border-b border-term-border flex justify-between items-center bg-term-card z-10">
                    <h3 class="font-bold tracking-wider uppercase text-sm flex items-center gap-2 text-term-text">
                        <i data-lucide="database" class="w-4 h-4"></i> Playlist
                    </h3>
                    <span id="track-count" class="text-xs bg-term-bg border border-term-border text-[#888] px-3 py-1 font-bold">0 FILES</span>
                </div>
                
                <div id="playlist-container" class="flex-1 overflow-y-auto p-4 scrollbar-hide bg-term-bg">
                    </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script>
        lucide.createIcons();

        // --- YOUR AUDIO DATA ---
        const playlist = [
            { id: 0, title: "As alive as you need me to be", originalArtist: "NIN", src: "AsAlive.m4a" },
            { id: 1, title: "Be with you", originalArtist: "Kimiko", src: "BeWithU.m4a" },
            { id: 2, title: "Now and then", originalArtist: "Akera Sky", src: "NowAndThen.m4a" },
            { id: 3, title: "Drunk", originalArtist: "Unknown", src: "Drunk.m4a" },
            { id: 4, title: "Toxic Luv", originalArtist: "Haruno 春野", src: "ToxicLuv.mp3" },
            { id: 5, title: "Holy", originalArtist: "Lexie Liu", src: "Holy.m4a" },
            { id: 6, title: "Juicy", originalArtist: "Jordan Ward", src: "Juicy.mp3" },
            { id: 7, title: "Moments", originalArtist: "FKJ", src: "Moments.mp3" },
            { id: 8, title: "Novio No", originalArtist: "Sech", src: "NovioNo.mp3" },
            { id: 9, title: "On the low", originalArtist: "Tiwa Savage", src: "OnTheLow.mp3" },
            { id: 10, title: "Kimi", originalArtist: "Moad Edge", src: "Kimi.m4a" },
            { id: 11, title: "Less of you", originalArtist: "keshi", src: "LessOfU.m4a" },
            { id: 12, title: "One eye open", originalArtist: "Mimi Webb", src: "OneEyeOpen.m4a" },
            { id: 13, title: "One last time", originalArtist: "Fiji Blue", src: "OneLastTime.m4a" },
            { id: 14, title: "Save me", originalArtist: "Thousand Below", src: "SaveMe.mp3" },
            { id: 15, title: "Set me free", originalArtist: "Martin Garrix & Arcando", src: "SetMeFree.mp3" },
            { id: 16, title: "Watch out", originalArtist: "Kardi", src: "WatchOut.mp3" }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 1; 

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('btn-play');
        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');
        const shuffleBtn = document.getElementById('btn-shuffle');
        const repeatBtn = document.getElementById('btn-repeat');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const titleEl = document.getElementById('current-title');
        const artistEl = document.getElementById('current-artist');
        const playlistContainer = document.getElementById('playlist-container');
        
        // Visualizer Elements
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const visPlaceholder = document.getElementById('vis-placeholder');
        
        let audioCtx;
        let analyser;
        let source;
        let isVisualizerInitialized = false;

        function init() {
            document.getElementById('track-count').innerText = `${playlist.length} FILES`;
            renderPlaylist();
            loadTrack(currentTrackIndex, false);
            updateControlStyles();
            
            canvas.width = 300;
            canvas.height = 300;
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = `playlist-item flex items-center p-4 mb-2 cursor-pointer group`;
                if(index === currentTrackIndex) div.classList.add('active');
                
                div.innerHTML = `
                    <div class="w-10 text-xs text-[#888] group-hover:text-term-text transition-colors">[0${index.toString(16).toUpperCase()}]</div>
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="text-[0.95rem] truncate text-white group-hover:text-term-text transition-colors">${track.title}</div>
                        <div class="text-xs text-[#888] truncate transition-colors">> ${track.originalArtist}</div>
                    </div>
                    <div class="w-8 h-8 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="play" class="w-4 h-4 text-term-text"></i>
                    </div>
                `;
                
                div.onclick = () => {
                    currentTrackIndex = index;
                    loadTrack(currentTrackIndex, true);
                };
                playlistContainer.appendChild(div);
            });
            lucide.createIcons();
        }

        function updatePlaylistHighlight() {
            const items = playlistContainer.querySelectorAll('.playlist-item');
            items.forEach((item, index) => {
                if(index === currentTrackIndex) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // --- AUDIO VISUALIZER (TERMINAL THEME) ---
        function initVisualizer() {
            if (isVisualizerInitialized) return;
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            analyser.fftSize = 128;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            function draw() {
                requestAnimationFrame(draw);
                if(!isPlaying) return;
                
                analyser.getByteFrequencyData(dataArray);
                
                // Draw dark terminal background with slight trail
                canvasCtx.fillStyle = 'rgba(5, 5, 5, 0.25)'; 
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / bufferLength) * 2;
                let barHeight;
                let x = 0;
                
                for(let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i];
                    
                    // Matrix Green gradient based on frequency
                    canvasCtx.fillStyle = `rgb(0, ${100 + (155 * (i/bufferLength))}, 65)`;
                    
                    // Draw blocky bars
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                    x += barWidth + 1;
                }
            }
            
            draw();
            isVisualizerInitialized = true;
        }

        function loadTrack(index, playInstantly = true) {
            const track = playlist[index];
            audio.src = track.src;
            titleEl.innerText = `> ${track.title}`;
            artistEl.innerText = `AUTHOR: ${track.originalArtist}`;
            
            updatePlaylistHighlight();
            
            if (playInstantly) {
                playAudio();
            } else {
                pauseAudio();
            }
        }

        function playAudio() {
            initVisualizer();
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            audio.play();
            isPlaying = true;
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
            visPlaceholder.classList.add('opacity-0');
            
            canvasCtx.fillStyle = '#050505';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function pauseAudio() {
            audio.pause();
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            visPlaceholder.classList.remove('opacity-0');
        }

        function togglePlay() {
            if (isPlaying) pauseAudio();
            else playAudio();
        }

        function playNext() {
            if (isShuffle) {
                let newIndex = currentTrackIndex;
                while (newIndex === currentTrackIndex && playlist.length > 1) {
                    newIndex = Math.floor(Math.random() * playlist.length);
                }
                currentTrackIndex = newIndex;
            } else {
                currentTrackIndex++;
                if (currentTrackIndex >= playlist.length) currentTrackIndex = 0;
            }
            loadTrack(currentTrackIndex, true);
        }

        function playPrev() {
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else {
                currentTrackIndex--;
                if (currentTrackIndex < 0) currentTrackIndex = playlist.length - 1;
                loadTrack(currentTrackIndex, true);
            }
        }

        audio.addEventListener('ended', () => {
            if (repeatMode === 2) {
                audio.currentTime = 0;
                playAudio();
            } else if (repeatMode === 1 || isShuffle) {
                playNext();
            } else {
                if (currentTrackIndex < playlist.length - 1) playNext();
                else pauseAudio();
            }
        });

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', playNext);
        prevBtn.addEventListener('click', playPrev);

        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            updateControlStyles();
        });

        repeatBtn.addEventListener('click', () => {
            repeatMode = (repeatMode + 1) % 3;
            updateControlStyles();
        });

        function updateControlStyles() {
            if (isShuffle) shuffleBtn.classList.add('active');
            else shuffleBtn.classList.remove('active');

            repeatBtn.classList.remove('active', 'text-term-text');
            if (repeatMode === 1) {
                repeatBtn.classList.add('active');
                repeatBtn.innerHTML = '<i data-lucide="repeat" class="w-5 h-5"></i>';
            } else if (repeatMode === 2) {
                repeatBtn.classList.add('active');
                // Use stroke to make repeat-1 bolder
                repeatBtn.innerHTML = '<i data-lucide="repeat-1" class="w-5 h-5" style="stroke-width: 3px;"></i>';
            } else {
                repeatBtn.classList.remove('active');
                repeatBtn.innerHTML = '<i data-lucide="repeat" class="w-5 h-5"></i>';
            }
            lucide.createIcons();
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progressPercent;
                currentTimeEl.innerText = formatTime(audio.currentTime);
                totalTimeEl.innerText = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('input', (e) => {
            if (audio.duration) {
                const seekTime = (e.target.value / 100) * audio.duration;
                audio.currentTime = seekTime;
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        init();
    </script>
</body>
</html>
